[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solarreach-api"
version = "0.1.0"
description = "SolarReach FastAPI gateway."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "SolarReach Team" }]
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "motor>=3.6",
    "pydantic[email]>=2.9",
    "pydantic-settings>=2.6",
    "sse-starlette>=2.1",
    "httpx>=0.28",
    "anthropic>=0.40",
    "redis>=5.2",
    "celery>=5.4",
    "python-multipart",
    "solarreach-shared",
    "codex-brain",
    # Solar API — GeoTIFF → reproject → inferno PNG (services/solar_api.py)
    "rasterio>=1.3",
    "pyproj>=3.6",
    "matplotlib>=3.9",
    "pillow>=10.4",
    "numpy>=1.26",
    "solarreach-swarm",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "mongomock-motor>=0.0.34",
    "httpx>=0.28",
    "ruff>=0.6",
]

[tool.uv.sources]
solarreach-shared = { path = "../shared/py", editable = true }
codex-brain = { path = "../codex", editable = true }
solarreach-swarm = { path = "../swarm", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]

[dependency-groups]
dev = [
    "respx>=0.23.1",
]
