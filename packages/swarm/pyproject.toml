[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "solarreach-swarm"
version = "0.1.0"
description = "SolarReach hierarchical multi-agent (CrewAI) orchestration layer."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "SolarReach Team" }]
license = { text = "MIT" }
dependencies = [
    "crewai>=0.70",
    "crewai-tools>=0.10",
    "langchain>=0.3",
    "langchain-anthropic>=0.2",
    "langchain-mongodb>=0.2",
    "pymongo>=4.10",
    "motor>=3.6",
    "python-pptx>=1.0",
    "elevenlabs>=1.0",
    "google-search-results>=2.4",
    "voyageai>=0.3",
    "python-dotenv>=1.0",
    "anthropic>=0.40",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.6",
]

[tool.hatch.build.targets.wheel]
packages = ["swarm"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
