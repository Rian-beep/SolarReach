[project]
name = "codex_brain"
version = "0.1.0"
description = "SolarReach Codex Brain — pitch deck, email, and decision-maker generation."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "SolarReach Hackathon Team" }]
dependencies = [
    "anthropic>=0.40",
    "pydantic>=2.9",
    "python-pptx>=1.0",
    "matplotlib>=3.9",
    "pillow>=10.4",
    "motor>=3.6",
    "celery>=5.4",
    "redis>=5.2",
    "httpx>=0.28",
    "pypdf>=4.3",
    "voyageai>=0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["codex_brain"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
