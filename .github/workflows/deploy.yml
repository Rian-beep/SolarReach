name: deploy

# Manual-only. Builds production images for api / codex / web and (optionally)
# pushes them to ghcr.io. If GHCR auth isn't available the build still runs
# end-to-end so the Dockerfiles stay green — only the push is skipped.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag (in addition to git SHA + 'latest')"
        required: false
        default: ""
      push:
        description: "Push to ghcr.io (requires write:packages on GITHUB_TOKEN)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX resolves to e.g. ghcr.io/rian-beep/solarreach
  IMAGE_PREFIX: ${{ github.repository_owner }}/solarreach

jobs:
  # ---------------------------------------------------------------------------
  # Single matrix job — same Buildx + login flow per service. Each service has
  # its own context + Dockerfile so the cache scope is isolated.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: build (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: infra/Dockerfile.prod.api
          - service: codex
            context: .
            dockerfile: infra/Dockerfile.prod.codex
          - service: web
            context: packages/web
            dockerfile: infra/Dockerfile.prod.web
    steps:
      - uses: actions/checkout@v4

      - name: set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: detect ghcr auth
        id: auth
        run: |
          if [ "${{ inputs.push }}" = "true" ] && [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GHCR push disabled — building only (validates Dockerfile)."
          fi

      - name: log in to ghcr.io
        if: steps.auth.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}"
          # Lowercase — ghcr.io rejects mixed case.
          BASE="$(echo "$BASE" | tr '[:upper:]' '[:lower:]')"
          SHA_SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          TAGS="$BASE:$SHA_SHORT,$BASE:latest"
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="$TAGS,$BASE:${{ inputs.tag }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "primary=$BASE:$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: build${{ steps.auth.outputs.push == 'true' && ' + push' || ' (no push)' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ steps.auth.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.title=solarreach-${{ matrix.service }}

      - name: summary
        run: |
          {
            echo "### ${{ matrix.service }}"
            echo ""
            echo "- pushed: \`${{ steps.auth.outputs.push }}\`"
            echo "- primary: \`${{ steps.tags.outputs.primary }}\`"
            echo "- all tags:"
            echo '```'
            echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
